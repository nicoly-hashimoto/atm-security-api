[pytest]
# Configuração do pytest para os testes da ATM Security API
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
markers =
    auth: Testes de autenticação
    protected: Testes de endpoints protegidos
    public: Testes de endpoints públicos
    permissions: Testes de permissões
    events: Testes de processamento de eventos
